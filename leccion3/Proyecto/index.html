<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App de compras mejorada</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container-principal">
      <!-- Contenedor de productos y filtros -->
      <div class="container-productos" id="paquetes-container">
        <h1>Aura Media</h1>
        <div class="filtros">
          <button onclick="filtrarEconomicos()">
             Filtrar 
          </button>
          <button onclick="ordenarAlfabeticamente()">
             Ordenar A-Z 
          </button>
          <button onclick="generarListaNombres()">
             Solo nombres 
          </button>
          <button onclick="mostrarPaquetes(paquetes)">Restablecer</button>
          <div id="lista-nombres-map"></div>
        </div>
        <div id="lista-productos"></div>
      </div>

      <!-- Contenedor del carrito -->
      <div class="container-carrito">
        <h2>Carrito de compras</h2>
        <ul id="carrito-lista"></ul>
        <p>Total: $<span id="total">0.00</span></p>
        <button id="btn-comprar">Comprar</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
